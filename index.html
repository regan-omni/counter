<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MediaPipe Live Counter</title>

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; }
        #camera-container { position: relative; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        video, canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        canvas { z-index: 10; }
        
        #ui-panel { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(8px); color: #fff; padding: 20px 30px; border-radius: 16px; z-index: 20; width: 80%; max-width: 350px; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5); border: 1px solid rgba(255,255,255,0.1); }
        .stat-row { display: flex; justify-content: space-between; align-items: center; margin: 10px 0; font-size: 1.1rem; }
        .stat-row:first-child { margin-top: 0; }
        .stat-row:last-child { margin-bottom: 0; }
        .label { color: #94a3b8; font-weight: 500; }
        .value { font-weight: bold; font-size: 1.4rem; }
        .total-value { color: #4ade80; } 
        .stack-value { color: #f43f5e; } 
        
        #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.8); color: white; padding: 20px 30px; border-radius: 12px; z-index: 30; font-size: 1.2rem; font-weight: bold; text-align: center; }
    </style>
</head>
<body>

    <div id="loading">Initializing MediaPipe<br><small style="font-size: 0.8rem; font-weight: normal;">Optimizing for GPU...</small></div>

    <div id="camera-container">
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="overlay"></canvas>
    </div>

    <div id="ui-panel">
        <div class="stat-row">
            <span class="label">Total Items:</span>
            <span class="value total-value" id="total-count">0</span>
        </div>
        <div class="stat-row">
            <span class="label">Distinct Stacks:</span>
            <span class="value stack-value" id="stack-count">0</span>
        </div>
    </div>

    <!-- MediaPipe requires ES Modules -->
    <script type="module">
        import {
            ObjectDetector,
            FilesetResolver
        } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/vision_bundle.mjs";

        const video = document.getElementById('webcam');
        const canvas = document.getElementById('overlay');
        const ctx = canvas.getContext('2d');
        
        let objectDetector;
        let runningMode = "VIDEO";
        let lastVideoTime = -1;

        // Configuration
        const PROXIMITY_THRESHOLD = 20; 
        const IOU_DUPLICATE_THRESHOLD = 0.75; // Increased tolerance for dense objects

        // 1. Initialize MediaPipe
        async function initializeMediaPipe() {
            const vision = await FilesetResolver.forVisionTasks(
                "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm"
            );
            
            objectDetector = await ObjectDetector.createFromOptions(vision, {
                baseOptions: {
                    // This is the default model. When you train a custom model for pipes/markers, 
                    // host the .tflite file online and paste the URL right here!
                    modelAssetPath: "https://storage.googleapis.com/mediapipe-models/object_detector/efficientdet_lite0/float16/1/efficientdet_lite0.tflite",
                    delegate: "GPU" // Massive speed boost on mobile
                },
                scoreThreshold: 0.25, // Lowered to catch more items in dense stacks
                maxResults: 100,      // Allow up to 100 detections (default is usually low)
                runningMode: runningMode
            });

            startCamera();
        }

        // 2. Start Camera
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment' },
                    audio: false
                });
                video.srcObject = stream;
                
                video.addEventListener('loadeddata', () => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    document.getElementById('loading').style.display = 'none';
                    detectFrame();
                });
            } catch (err) {
                alert("Camera access denied.");
                console.error(err);
            }
        }

        // 3. Detection Loop optimized for MediaPipe
        function detectFrame() {
            // Only run detection if the video frame has updated
            if (video.currentTime !== lastVideoTime) {
                lastVideoTime = video.currentTime;
                
                // MediaPipe requires the exact timestamp
                const startTimeMs = performance.now();
                const detections = objectDetector.detectForVideo(video, startTimeMs);
                
                processAndDraw(detections.detections);
            }
            
            // Loop natively with screen refresh rate
            requestAnimationFrame(detectFrame);
        }

        // 4. Stacking & Deduplication Logic (Adapted for MediaPipe format)
        function processAndDraw(rawDetections) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Convert MediaPipe format to our standard[x,y,w,h] format
            let predictions = rawDetections.map(d => ({
                bbox:[d.boundingBox.originX, d.boundingBox.originY, d.boundingBox.width, d.boundingBox.height],
                class: d.categories[0].categoryName,
                score: d.categories[0].score
            }));

            // Step 1: Deduplication (IoU)
            let cleanPredictions =[];
            predictions.forEach(p => {
                let isDuplicate = false;
                for (let i = 0; i < cleanPredictions.length; i++) {
                    let c = cleanPredictions[i];
                    if (calculateIoU(p.bbox, c.bbox) > IOU_DUPLICATE_THRESHOLD) {
                        isDuplicate = true;
                        if (p.score > c.score) cleanPredictions[i] = p; // Keep higher confidence
                        break;
                    }
                }
                if (!isDuplicate) cleanPredictions.push(p);
            });

            // Step 2: Grouping into Stacks
            let stacks = []; 
            cleanPredictions.forEach(pred => {
                let matchedStacks =[];
                for (let i = 0; i < stacks.length; i++) {
                    let stack = stacks[i];
                    let belongs = stack.some(stackItem => 
                        checkProximityIntersection(pred.bbox, stackItem.bbox, PROXIMITY_THRESHOLD)
                    );
                    if (belongs) matchedStacks.push(i);
                }

                if (matchedStacks.length === 0) {
                    stacks.push([pred]);
                } else {
                    let firstStackIdx = matchedStacks[0];
                    stacks[firstStackIdx].push(pred);
                    if (matchedStacks.length > 1) {
                        for (let j = matchedStacks.length - 1; j >= 1; j--) {
                            let idxToMerge = matchedStacks[j];
                            stacks[firstStackIdx].push(...stacks[idxToMerge]);
                            stacks.splice(idxToMerge, 1);
                        }
                    }
                }
            });

            // Step 3: Draw Bounding Boxes
            cleanPredictions.forEach(pred => {
                const[x, y, width, height] = pred.bbox;
                ctx.strokeStyle = '#4ade80';
                ctx.lineWidth = 2;
                ctx.strokeRect(x, y, width, height);

                ctx.fillStyle = '#4ade80';
                ctx.font = 'bold 14px sans-serif';
                ctx.fillText(`${pred.class} (${Math.round(pred.score * 100)}%)`, x, y > 15 ? y - 4 : y + 15);
            });

            // Step 4: Draw Stack Groups
            stacks.forEach((stack) => {
                if (stack.length > 1) {
                    let minX = Math.min(...stack.map(p => p.bbox[0]));
                    let minY = Math.min(...stack.map(p => p.bbox[1]));
                    let maxX = Math.max(...stack.map(p => p.bbox[0] + p.bbox[2]));
                    let maxY = Math.max(...stack.map(p => p.bbox[1] + p.bbox[3]));

                    ctx.strokeStyle = '#f43f5e'; 
                    ctx.lineWidth = 3;
                    ctx.setLineDash([8, 6]); 
                    ctx.strokeRect(minX - 10, minY - 10, (maxX - minX) + 20, (maxY - minY) + 20);
                    ctx.setLineDash([]); 
                    
                    ctx.fillStyle = '#f43f5e';
                    ctx.font = 'bold 16px sans-serif';
                    ctx.fillText(`Stack (${stack.length})`, minX - 10, minY - 15);
                }
            });

            // Step 5: Update UI UI
            document.getElementById('total-count').innerText = cleanPredictions.length;
            document.getElementById('stack-count').innerText = stacks.length;
        }

        // --- Helper Math Functions ---
        function checkProximityIntersection(box1, box2, padding) {
            const [x1, y1, w1, h1] = box1;
            const [x2, y2, w2, h2] = box2;
            const px1 = x1 - padding; const py1 = y1 - padding;
            const pw1 = w1 + padding * 2; const ph1 = h1 + padding * 2;
            return !(px1 > x2 + w2 || px1 + pw1 < x2 || py1 > y2 + h2 || py1 + ph1 < y2);
        }

        function calculateIoU(box1, box2) {
            const[x1, y1, w1, h1] = box1;
            const[x2, y2, w2, h2] = box2;
            const intersectionX = Math.max(0, Math.min(x1 + w1, x2 + w2) - Math.max(x1, x2));
            const intersectionY = Math.max(0, Math.min(y1 + h1, y2 + h2) - Math.max(y1, y2));
            const intersectionArea = intersectionX * intersectionY;
            const unionArea = (w1 * h1) + (w2 * h2) - intersectionArea;
            return intersectionArea / unionArea;
        }

        // Boot up
        window.addEventListener('DOMContentLoaded', initializeMediaPipe);
    </script>
</body>
</html>
